<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>밸런스 게임 & 성향 분석</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5a623;
            --background-color: #f9f9fb;
            --card-color: #ffffff;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--background-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--card-color);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1, h2, h3 {
            text-align: center;
            color: #2c3e50;
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            background-color: #fff;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .survey-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .survey-item {
            display: flex;
            flex-direction: column;
        }

        .survey-item label {
            font-size: 14px;
            color: #555;
        }

        input[type="number"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }

        .score-counter {
            text-align: right;
            font-weight: bold;
            color: #e74c3c;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #357abd;
        }

        /* 결과 화면 레이아웃 (좌우 반분) */
        .result-wrapper {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            margin-top: 30px;
            display: none; /* 초기 숨김 */
        }

        .chart-container {
            width: 48%;
            min-width: 300px;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        /* 관리자 섹션 */
        .admin-trigger {
            text-align: center;
            margin-top: 50px;
            font-size: 12px;
            color: #aaa;
            cursor: pointer;
        }

        .admin-panel {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border: 2px dashed #e74c3c;
            border-radius: 8px;
            background: #fff5f5;
        }

        .admin-panel input {
            margin-bottom: 10px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 밸런스 성향 테스트</h1>
    
    <form id="surveyForm">
        <div class="section">
            <label for="nickname">💬 오픈채팅방 닉네임</label>
            <input type="text" id="nickname" required placeholder="오픈채팅방에서 사용하는 닉네임을 적어주세요.">
        </div>

        <div class="section">
            <h3>Q1. 배우자를 선택할 때 중요한 점</h3>
            <p style="color: #666; font-size:13px;">* 각 항목에 0~5점을 배분하세요. (총점 20점 제한)</p>
            <div class="survey-grid q1-group">
                <div class="survey-item"><label>외모</label><input type="number" min="0" max="5" value="0" class="q1-input"></div>
                <div class="survey-item"><label>학력</label><input type="number" min="0" max="5" value="0" class="q1-input"></div>
                <div class="survey-item"><label>집안</label><input type="number" min="0" max="5" value="0" class="q1-input"></div>
                <div class="survey-item"><label>성격</label><input type="number" min="0" max="5" value="0" class="q1-input"></div>
                <div class="survey-item"><label>가치관</label><input type="number" min="0" max="5" value="0" class="q1-input"></div>
                <div class="survey-item"><label>재산</label><input type="number" min="0" max="5" value="0" class="q1-input"></div>
            </div>
            <div class="score-counter" id="q1Counter">Q1 총점: 0 / 20</div>
        </div>

        <div class="section">
            <h3>Q2. 미국 이민을 갈 때 가장 이상적인 도시?</h3>
            <p style="color: #666; font-size:13px;">* 각 항목에 0~5점을 배분하세요. (총점 20점 제한)</p>
            <div class="survey-grid q2-group">
                <div class="survey-item"><label>날씨</label><input type="number" min="0" max="5" value="0" class="q2-input"></div>
                <div class="survey-item"><label>인프라·생활편리성</label><input type="number" min="0" max="5" value="0" class="q2-input"></div>
                <div class="survey-item"><label>저렴한 생활비</label><input type="number" min="0" max="5" value="0" class="q2-input"></div>
                <div class="survey-item"><label>연봉</label><input type="number" min="0" max="5" value="0" class="q2-input"></div>
                <div class="survey-item"><label>치안</label><input type="number" min="0" max="5" value="0" class="q2-input"></div>
                <div class="survey-item"><label>자녀교육</label><input type="number" min="0" max="5" value="0" class="q2-input"></div>
            </div>
            <div class="score-counter" id="q2Counter">Q2 총점: 0 / 20</div>
        </div>

        <button type="submit" id="submitBtn">결과 제출하기</button>
    </form>

    <div class="result-wrapper" id="resultArea">
        <div class="chart-container">
            <h3>❤️ 배우자 선택 가치관</h3>
            <canvas id="chart1"></canvas>
        </div>
        <div class="chart-container">
            <h3>🇺🇸 이민 도시 선호도</h3>
            <canvas id="chart2"></canvas>
        </div>
    </div>

    <div class="admin-trigger" onclick="toggleAdminPanel()">🔒 관리자 모드</div>
    <div class="admin-panel" id="adminPanel">
        <h3>📊 응답 데이터 관리자 패널</h3>
        <input type="text" id="adminId" placeholder="관리자 아이디"><br>
        <input type="password" id="adminPw" placeholder="비밀번호"><br>
        <button type="button" onclick="downloadCSV()" style="background-color: #e74c3c;">인증 및 CSV 다운로드</button>
    </div>
</div>

<script>
    // 중복 제출 검증 키값
    const ALREADY_SUBMITTED_KEY = 'balance_game_submitted';
    const DATA_STORAGE_KEY = 'balance_game_responses';

    // 실시간 점수 합계 계산 및 제한 
    function setupScoreValidation(className, counterId) {
        const inputs = document.querySelectorAll('.' + className);
        const counter = document.getElementById(counterId);

        inputs.forEach(input => {
            input.addEventListener('input', () => {
                // 0~5 점수 제한 강제
                let val = parseInt(input.value) || 0;
                if (val < 0) input.value = 0;
                if (val > 5) input.value = 5;

                // 총점 계산
                let total = 0;
                inputs.forEach(i => total += (parseInt(i.value) || 0));

                // 20점 초과 시 경고 및 입력 취소 처리
                if (total > 20) {
                    alert('총점은 20점을 초과할 수 없습니다!');
                    input.value = val - (total - 20);
                    total = 20;
                }
                counter.innerText = `총점: ${total} / 20`;
            });
        });
    }

    setupScoreValidation('q1-input', 'q1Counter');
    setupScoreValidation('q2-input', 'q2Counter');

    // 폼 제출 이벤트
    document.getElementById('surveyForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // 1. 중복 제출 체크 (localStorage 활용)
        if (localStorage.getItem(ALREADY_SUBMITTED_KEY)) {
            alert('이미 참여하셨습니다.');
            return;
        }

        const nickname = document.getElementById('nickname').value.trim();
        
        // Q1 점수 추출
        const q1Inputs = document.querySelectorAll('.q1-input');
        let q1Data = [];
        let q1Total = 0;
        q1Inputs.forEach(i => {
            let v = parseInt(i.value) || 0;
            q1Data.push(v);
            q1Total += v;
        });

        // Q2 점수 추출
        const q2Inputs = document.querySelectorAll('.q2-input');
        let q2Data = [];
        let q2Total = 0;
        q2Inputs.forEach(i => {
            let v = parseInt(i.value) || 0;
            q2Data.push(v);
            q2Total += v;
        });

        // 점수 완결성 최종 확인 (안전장치)
        if (q1Total > 20 || q2Total > 20) {
            alert('설문당 최대 20점까지만 사용 가능합니다. 점수를 확인해주세요.');
            return;
        }

        // 2. 데이터 저장 (Local Storage에 누적 데이터 구조화)
        let currentData = JSON.parse(localStorage.getItem(DATA_STORAGE_KEY)) || [];
        const newRecord = {
            timestamp: new Date().toLocaleString(),
            nickname: nickname,
            q1_외모: q1Data[0], q1_학력: q1Data[1], q1_집안: q1Data[2], q1_성격: q1Data[3], q1_가치관: q1Data[4], q1_재산: q1Data[5],
            q2_날씨: q2Data[0], q2_인프라: q2Data[1], q2_생활비: q2Data[2], q2_연봉: q2Data[3], q2_치안: q2Data[4], q2_자녀교육: q2Data[5]
        };
        currentData.push(newRecord);
        localStorage.setItem(DATA_STORAGE_KEY, JSON.stringify(currentData));

        // 중복 제출 방지 락 걸기
        localStorage.setItem(ALREADY_SUBMITTED_KEY, 'true');

        // 3. 화면 업데이트 및 육각형 그래프 시각화
        document.getElementById('surveyForm').classList.add('hidden');
        document.getElementById('resultArea').style.display = 'flex';

        renderCharts(q1Data, q2Data);
        alert('성공적으로 제출되었습니다! 당신의 성향 결과를 확인하세요.');
    });

    // Chart.js를 이용한 육각형 레이더 차트 그리기
    function renderCharts(q1Data, q2Data) {
        const chartOptions = {
            scales: {
                r: {
                    angleLines: { display: true },
                    suggestedMin: 0,
                    suggestedMax: 5,
                    ticks: { stepSize: 1, display: false }
                }
            },
            plugins: { legend: { display: false } }
        };

        // 좌측 차트: 배우자 기준
        new Chart(document.getElementById('chart1'), {
            type: 'radar',
            data: {
                labels: ['외모', '학력', '집안', '성격', '가치관', '재산'],
                datasets: [{
                    data: q1Data,
                    backgroundColor: 'rgba(74, 144, 226, 0.2)',
                    borderColor: 'rgba(74, 144, 226, 1)',
                    borderWidth: 2,
                    pointBackgroundColor: 'rgba(74, 144, 226, 1)'
                }]
            },
            options: chartOptions
        });

        // 우측 차트: 이민 도시 기준
        new Chart(document.getElementById('chart2'), {
            type: 'radar',
            data: {
                labels: ['날씨', '인프라·생활편리성', '저렴한 생활비', '연봉', '치안', '자녀교육'],
                datasets: [{
                    data: q2Data,
                    backgroundColor: 'rgba(245, 166, 35, 0.2)',
                    borderColor: 'rgba(245, 166, 35, 1)',
                    borderWidth: 2,
                    pointBackgroundColor: 'rgba(245, 166, 35, 1)'
                }]
            },
            options: chartOptions
        });
    }

    // 관리자 패널 열고 닫기
    function toggleAdminPanel() {
        const panel = document.getElementById('adminPanel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    // 관리자 전용 CSV 다운로드 로직
    function downloadCSV() {
        const id = document.getElementById('adminId').value;
        const pw = document.getElementById('adminPw').value;

        // 관리자 인증정보 대조
        if (id === 'admin' && pw === 'GoUSA1') {
            const data = JSON.parse(localStorage.getItem(DATA_STORAGE_KEY)) || [];
            if (data.length === 0) {
                alert('저장된 응답 데이터가 없습니다.');
                return;
            }

            // CSV 데이터 변환 (BOM 추가로 엑셀 한글 깨짐 방지)
            let csvContent = "\uFEFF"; 
            
            // 헤더 작성
            const headers = Object.keys(data[0]);
            csvContent += headers.join(",") + "\n";

            // 행 데이터 작성
            data.forEach(row => {
                let rowStr = headers.map(header => {
                    let cell = row[header] === undefined ? '' : row[header];
                    // 쉼표가 들어간 데이터 예방 포매팅
                    if (typeof cell === 'string' && cell.includes(',')) {
                        cell = `"${cell}"`;
                    }
                    return cell;
                }).join(",");
                csvContent += rowStr + "\n";
            });

            // 파일 다운로드 트리거
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `balance_game_results_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        } else {
            alert('관리자 계정 정보가 일치하지 않습니다.');
        }
    }

    // 페이지 로드 시 이미 참여했는지 여부 미리 판별하여 화면 제어 (선택 사항)
    window.onload = function() {
        if (localStorage.getItem(ALREADY_SUBMITTED_KEY)) {
            // 원할 경우 "이미 참여하셨습니다" 문구를 띄우고 진입을 막을 수 있습니다.
            // 여기서는 사용자 제출 이벤트 시점에 명확히 차단하도록 구현되어 있습니다.
        }
    }
</script>
</body>
</html>
