<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>밸런스 게임 및 성향 분석</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5a623;
            --bg-color: #f9f9f9;
        }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1, h2, h3 { text-align: center; color: #222; }
        
        /* 결과 화면 및 그래프 레이아웃 */
        .result-section { display: none; margin-bottom: 30px; padding: 20px; border: 2px solid #e1e1e1; border-radius: 8px; background: #fff; }
        .current-user-title { text-align: center; font-size: 1.3em; font-weight: bold; color: var(--primary-color); margin-bottom: 20px; }
        .chart-wrapper { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .chart-box { flex: 1; min-width: 320px; text-align: center; background: #fafafa; padding: 15px; border-radius: 8px; box-shadow: inset 0 0 5px rgba(0,0,0,0.05); }
        canvas { max-width: 100%; height: auto; background: #fff; border-radius: 6px; }

        /* 과거 데이터 보기 컨트롤 */
        .history-controls { text-align: center; margin: 20px 0; display: flex; justify-content: center; gap: 10px; align-items: center; }
        button { padding: 10px 20px; border: none; border-radius: 6px; background-color: var(--primary-color); color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: #357abd; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        /* 설문 폼 스타일 */
        .form-group { margin-bottom: 25px; padding: 15px; border: 1px solid #eef2f5; border-radius: 8px; background: #fdfdfd; }
        .input-nickname { width: 100%; padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 6px; box-sizing: border-box; margin-bottom: 20px; }
        .survey-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; margin-top: 10px; }
        .survey-item { display: flex; flex-direction: column; align-items: center; }
        .survey-item label { margin-bottom: 5px; font-size: 14px; font-weight: bold; }
        .survey-item input { width: 70px; padding: 8px; text-align: center; font-size: 15px; border: 1px solid #bbb; border-radius: 4px; }
        
        .score-counter { text-align: right; font-size: 16px; font-weight: bold; margin: 10px 0; color: #555; }
        .score-counter span { color: red; }
        .submit-btn { width: 100%; padding: 15px; font-size: 18px; background-color: #2ecc71; margin-top: 10px; }
        .submit-btn:hover { background-color: #27ae60; }

        /* 관리자 섹션 */
        .admin-section { margin-top: 5px; text-align: right; }
        .admin-btn { background-color: #7f8c8d; font-size: 12px; padding: 6px 12px; }
        .admin-panel { display: none; margin-top: 20px; padding: 20px; border: 1px dashed red; background: #fff5f5; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="admin-section">
        <button class="admin-btn" onclick="toggleAdminPanel()">관리자 메뉴</button>
    </div>

    <div id="adminPanel" class="admin-panel">
        <h3>관리자 시스템 데이터 다운로드</h3>
        <input type="text" id="adminId" placeholder="아이디" style="padding:5px; margin:2px;">
        <input type="password" id="adminPw" placeholder="비밀번호" style="padding:5px; margin:2px;">
        <button onclick="downloadCSV()" style="background-color: #c0392b;">CSV 다운로드</button>
    </div>

    <h1>밸런스 게임 성향 분석</h1>

    <div id="resultSection" class="result-section">
        <div id="currentUserTitle" class="current-user-title"></div>
        
        <div class="history-controls">
            <button id="prevBtn" onclick="navigateHistory(-1)">◀ 이전 데이터</button>
            <span id="historyIndex">0 / 0</span>
            <button id="nextBtn" onclick="navigateHistory(1)">다음 데이터 ▶</button>
        </div>

        <div class="chart-wrapper">
            <div class="chart-box">
                <h3>[설문 1] 배우자 선택 시 중요도</h3>
                <canvas id="chart1" width="360" height="360"></canvas>
            </div>
            <div class="chart-box">
                <h3>[설문 2] 미국 이민 이상적인 도시</h3>
                <canvas id="chart2" width="360" height="360"></canvas>
            </div>
        </div>
    </div>

    <form id="surveyForm" onsubmit="submitSurvey(event)">
        <h2>성향 평가 입력</h2>
        <p style="color: #666; text-align:center;">※ 각 문항별 선택지에 0~5점을 배분하세요. (문항당 총합 최대 20점)</p>
        
        <input type="text" id="nickname" class="input-nickname" placeholder="오픈채팅방 닉네임을 입력하세요" required>

        <div class="form-group">
            <h3>Q1. 배우자를 선택할 때 중요한 점은?</h3>
            <div class="score-counter">사용된 점수: <span id="q1Total">0</span> / 20</div>
            <div class="survey-grid">
                <div class="survey-item"><label>외모</label><input type="number" class="q1-input" min="0" max="5" value="0" onchange="validateScores(1)"></div>
                <div class="survey-item"><label>학력</label><input type="number" class="q1-input" min="0" max="5" value="0" onchange="validateScores(1)"></div>
                <div class="survey-item"><label>집안</label><input type="number" class="q1-input" min="0" max="5" value="0" onchange="validateScores(1)"></div>
                <div class="survey-item"><label>성격</label><input type="number" class="q1-input" min="0" max="5" value="0" onchange="validateScores(1)"></div>
                <div class="survey-item"><label>가치관</label><input type="number" class="q1-input" min="0" max="5" value="0" onchange="validateScores(1)"></div>
                <div class="survey-item"><label>재산</label><input type="number" class="q1-input" min="0" max="5" value="0" onchange="validateScores(1)"></div>
            </div>
        </div>

        <div class="form-group">
            <h3>Q2. 미국 이민을 갈 때 가장 이상적인 도시는?</h3>
            <div class="score-counter">사용된 점수: <span id="q2Total">0</span> / 20</div>
            <div class="survey-grid">
                <div class="survey-item"><label>날씨</label><input type="number" class="q2-input" min="0" max="5" value="0" onchange="validateScores(2)"></div>
                <div class="survey-item"><label>인프라</label><input type="number" class="q2-input" min="0" max="5" value="0" onchange="validateScores(2)"></div>
                <div class="survey-item"><label>저렴한생활비</label><input type="number" class="q2-input" min="0" max="5" value="0" onchange="validateScores(2)"></div>
                <div class="survey-item"><label>연봉</label><input type="number" class="q2-input" min="0" max="5" value="0" onchange="validateScores(2)"></div>
                <div class="survey-item"><label>치안</label><input type="number" class="q2-input" min="0" max="5" value="0" onchange="validateScores(2)"></div>
                <div class="survey-item"><label>자녀교육</label><input type="number" class="q2-input" min="0" max="5" value="0" onchange="validateScores(2)"></div>
            </div>
        </div>

        <button type="submit" id="submitBtn" class="submit-btn">결과 제출 및 그래프 보기</button>
    </form>
</div>

<script>
    // 상태 변수 정의
    const Q1_LABELS = ["외모", "학력", "집안", "성격", "가치관", "재산"];
    const Q2_LABELS = ["날씨", "인프라", "저렴한생활비", "연봉", "치안", "자녀교육"];
    
    let dbData = JSON.parse(localStorage.getItem('balance_game_db')) || [];
    let historyViewerIndex = -1;

    window.onload = function() {
        checkSubmissionStatus();
        if(dbData.length > 0) {
            historyViewerIndex = dbData.length - 1; // 가장 최근 전송값 기준 설정
            showResultSection();
        }
    };

    // 중복 제출 체크 후 폼 제어
    function checkSubmissionStatus() {
        if (localStorage.getItem('already_voted') === 'true') {
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').innerText = "이미 참여하셨습니다.";
            document.getElementById('nickname').disabled = true;
            document.querySelectorAll('input[type="number"]').forEach(el => el.disabled = true);
        }
    }

    // 실시간 점수 합계 계산 및 Validation 검증
    function validateScores(surveyNum) {
        const inputs = document.querySelectorAll(`.q${surveyNum}-input`);
        let total = 0;
        
        inputs.forEach(input => {
            let val = parseInt(input.value) || 0;
            if (val < 0) { val = 0; input.value = 0; }
            if (val > 5) { val = 5; input.value = 5; }
            total += val;
        });

        document.getElementById(`q${surveyNum}Total`).innerText = total;

        if (total > 20) {
            document.getElementById(`q${surveyNum}Total`).style.color = "red";
        } else {
            document.getElementById(`q${surveyNum}Total`).style.color = "#555";
        }
        return total;
    }

    // 설문 데이터 Submit 처리 생성
    function submitSurvey(e) {
        e.preventDefault();

        if (localStorage.getItem('already_voted') === 'true') {
            alert("이미 참여하셨습니다.");
            return;
        }

        const q1Total = validateScores(1);
        const q2Total = validateScores(2);

        if (q1Total > 20 || q2Total > 20) {
            alert("각 설문당 할당 가능한 점수는 최대 20점까지입니다. 조절해 주세요.");
            return;
        }

        const nickname = document.getElementById('nickname').value.trim();
        if(!nickname) { alert("닉네임을 입력하세요."); return; }

        const q1Data = Array.from(document.querySelectorAll('.q1-input')).map(el => parseInt(el.value) || 0);
        const q2Data = Array.from(document.querySelectorAll('.q2-input')).map(el => parseInt(el.value) || 0);

        const newData = {
            timestamp: new Date().toLocaleString(),
            nickname: nickname,
            q1: q1Data,
            q2: q2Data
        };

        dbData.push(newData);
        localStorage.setItem('balance_game_db', JSON.stringify(dbData));
        localStorage.setItem('already_voted', 'true'); // 중복방지 락 플래그 활성화

        alert("성공적으로 등록되었습니다!");
        
        historyViewerIndex = dbData.length - 1;
        showResultSection();
        checkSubmissionStatus();
    }

    // 결과 창 렌더링 컨트롤러
    function showResultSection() {
        document.getElementById('resultSection').style.display = "block";
        updateCharts();
    }

    // 데이터 내역 앞뒤 네비게이터 작동 알고리즘
    function navigateHistory(direction) {
        historyViewerIndex += direction;
        if(historyViewerIndex < 0) historyViewerIndex = 0;
        if(historyViewerIndex >= dbData.length) historyViewerIndex = dbData.length - 1;
        updateCharts();
    }

    // 캔버스 육각형 차트 드로잉 핵심 함수
    function updateCharts() {
        if(dbData.length === 0) return;
        
        const currentRecord = dbData[historyViewerIndex];
        
        // 상단 인덱스 및 참여자 닉네임 표기 갱신
        document.getElementById('currentUserTitle').innerText = `📊 현재 조회 대상자: [ ${currentRecord.nickname} ] 님 결과`;
        document.getElementById('historyIndex').innerText = `${historyViewerIndex + 1} / ${dbData.length}`;
        
        document.getElementById('prevBtn').disabled = (historyViewerIndex === 0);
        document.getElementById('nextBtn').disabled = (historyViewerIndex === dbData.length - 1);

        // 각각 육각형 그리기 수행
        drawHexagonChart('chart1', Q1_LABELS, currentRecord.q1, '#4a90e2');
        drawHexagonChart('chart2', Q2_LABELS, currentRecord.q2, '#f5a623');
    }

    function drawHexagonChart(canvasId, labels, dataPoints, themeColor) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const maxRadius = 120; 
        const sides = 6;

        // 1. 가이드라인 그리드 스케일 백그라운드 그리기 (1단계~5단계 스케일 레이어 루프)
        for(let r = 1; r <= 5; r++) {
            ctx.beginPath();
            const currentRadius = (maxRadius / 5) * r;
            for(let i = 0; i < sides; i++) {
                const angle = (i * 2 * Math.PI / sides) - Math.PI / 2;
                const x = centerX + currentRadius * Math.cos(angle);
                const y = centerY + currentRadius * Math.sin(angle);
                if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.strokeStyle = "#e8e8e8";
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        // 2. 축 가이드 그리기 및 레이블 네이밍 텍스트 마킹
        ctx.font = "bold 13px Arial";
        ctx.fillStyle = "#333";
        ctx.textAlign = "center";

        for(let i = 0; i < sides; i++) {
            const angle = (i * 2 * Math.PI / sides) - Math.PI / 2;
            
            // 축선 그리기
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(centerX + maxRadius * Math.cos(angle), centerY + maxRadius * Math.sin(angle));
            ctx.strokeStyle = "#f0f0f0";
            ctx.stroke();

            // 텍스트 간격 정렬 연산 배치
            const textDistance = maxRadius + 22;
            const tx = centerX + textDistance * Math.cos(angle);
            const ty = centerY + textDistance * Math.sin(angle) + 4; // 가독성 축정렬 보정값 
            ctx.fillText(labels[i], tx, ty);
        }

        // 3. 사용자가 할당한 입력 가중치 레이더 도표 그리기
        ctx.beginPath();
        for(let i = 0; i < sides; i++) {
            const angle = (i * 2 * Math.PI / sides) - Math.PI / 2;
            const score = dataPoints[i] > 5 ? 5 : dataPoints[i]; // 최대 한계 점수 5 규격 고정
            const currentRadius = (maxRadius / 5) * score;
            const x = centerX + currentRadius * Math.cos(angle);
            const y = centerY + currentRadius * Math.sin(angle);
            
            if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath();
        
        // 다각형 스타일 채우기
        ctx.fillStyle = themeColor + "33"; // 알파 반투명 마스킹 조합
        ctx.fill();
        ctx.strokeStyle = themeColor;
        ctx.lineWidth = 3;
        ctx.stroke();

        // 각 꼭짓점 도트 포인트 강조 마킹 처리
        for(let i = 0; i < sides; i++) {
            const angle = (i * 2 * Math.PI / sides) - Math.PI / 2;
            const score = dataPoints[i] > 5 ? 5 : dataPoints[i];
            const currentRadius = (maxRadius / 5) * score;
            const x = centerX + currentRadius * Math.cos(angle);
            const y = centerY + currentRadius * Math.sin(angle);
            
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, 2 * Math.PI);
            ctx.fillStyle = themeColor;
            ctx.fill();
        }
    }

    // 관리자 기능 인터페이스 제어 
    function toggleAdminPanel() {
        const panel = document.getElementById('adminPanel');
        panel.style.display = (panel.style.display === "block") ? "none" : "block";
    }

    // 로컬 데이터 CSV 패키징 및 암호 검증 후 다운로드 빌더 함수
    function downloadCSV() {
        const adminId = document.getElementById('adminId').value;
        const adminPw = document.getElementById('adminPw').value;

        if (adminId !== "admin" || adminPw !== "GoUSA1") {
            alert("관리자 계정 정보가 정확하지 않습니다.");
            return;
        }

        if (dbData.length === 0) {
            alert("다운로드할 수 있는 데이터가 축적되지 않았습니다.");
            return;
        }

        // CSV 문자열 구조 처리 조립식 파이프라인 형성 (BOM 추가하여 한글 안 깨지게 처리)
        let csvContent = "\uFEFF제출시간,닉네임,Q1_외모,Q1_학력,Q1_집안,Q1_성격,Q1_가치관,Q1_재산,Q2_날씨,Q2_인프라,Q2_저렴한생활비,Q2_연봉,Q2_치안,Q2_자녀교육\n";
        
        dbData.forEach(row => {
            const line = [
                `"${row.timestamp}"`,
                `"${row.nickname.replace(/"/g, '""')}"`,
                row.q1.join(","),
                row.q2.join(",")
            ].join(",");
            csvContent += line + "\n";
        });

        // 가상 에이커 링크 트리거 파일 전송 다운로드 자동 유도 수행
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `balance_game_results_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
