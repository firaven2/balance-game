<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>밸런스 게임 & 성향 분석</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
            color: #333;
        }
        h1, h2 { text-align: center; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); position: relative; }
        .admin-btn-wrapper { position: absolute; top: 20px; right: 20px; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; background-color: #007bff; color: white; font-weight: bold; }
        .btn:hover { background-color: #0056b3; }
        .btn-danger { background-color: #dc3545; }
        .btn-danger:hover { background-color: #bd2130; }
        .btn-success { background-color: #28a745; }
        .btn-success:hover { background-color: #218838; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        
        .survey-section { margin-top: 25px; padding: 15px; border: 1px solid #eee; border-radius: 5px; background: #fcfcfc; }
        .survey-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .score-total { text-align: right; font-weight: bold; color: #e44d26; margin-top: 10px; }
        
        /* 결과 화면 레이아웃 (좌우 반반) */
        .result-view { display: none; }
        .current-user-title { text-align: center; font-size: 1.4em; color: #007bff; margin-bottom: 20px; background: #e7f1ff; padding: 10px; border-radius: 5px; }
        .chart-wrapper { display: flex; justify-content: space-between; flex-wrap: wrap; margin-top: 20px; }
        .chart-container { width: 48%; min-width: 300px; background: #fff; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .nav-buttons { text-align: center; margin-top: 20px; display: flex; justify-content: center; gap: 10px; }

        /* 관리자 모달 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 700px; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

<div class="container">
    <div class="admin-btn-wrapper">
        <button class="btn" style="background-color: #6c757d;" onclick="openAdminModal()">관리자 로그인</button>
    </div>

    <h1>밸런스 게임 및 성향 분석</h1>
    <hr>

    <div id="surveyForm">
        <div class="form-group">
            <label for="nickname">오픈채팅방 닉네임</label>
            <input type="text" id="nickname" placeholder="닉네임을 입력하세요" required>
        </div>

        <div class="survey-section">
            <h3>Q1. 배우자를 선택할 때 중요한 점 (총 20점 제한, 각 0~5점)</h3>
            <div class="survey-grid">
                <div class="form-group"><label>외모</label><input type="number" class="q1-input" min="0" max="5" value="0" onchange="calcTotal()"></div>
                <div class="form-group"><label>학력</label><input type="number" class="q1-input" min="0" max="5" value="0" onchange="calcTotal()"></div>
                <div class="form-group"><label>집안</label><input type="number" class="q1-input" min="0" max="5" value="0" onchange="calcTotal()"></div>
                <div class="form-group"><label>성격</label><input type="number" class="q1-input" min="0" max="5" value="0" onchange="calcTotal()"></div>
                <div class="form-group"><label>가치관</label><input type="number" class="q1-input" min="0" max="5" value="0" onchange="calcTotal()"></div>
                <div class="form-group"><label>재산</label><input type="number" class="q1-input" min="0" max="5" value="0" onchange="calcTotal()"></div>
            </div>
            <div class="score-total" id="q1Total">현재 Q1 총점: 0 / 20점</div>
        </div>

        <div class="survey-section">
            <h3>Q2. 미국 이민을 갈 때 가장 이상적인 도시? (총 20점 제한, 각 0~5점)</h3>
            <div class="survey-grid">
                <div class="form-group"><label>날씨</label><input type="number" class="q2-input" min="0" max="5" value="0" onchange="calcTotal()"></div>
                <div class="form-group"><label>생활편리성</label><input type="number" class="q2-input" min="0" max="5" value="0" onchange="calcTotal()"></div>
                <div class="form-group"><label>저렴한생활비</label><input type="number" class="q2-input" min="0" max="5" value="0" onchange="calcTotal()"></div>
                <div class="form-group"><label>연봉</label><input type="number" class="q2-input" min="0" max="5" value="0" onchange="calcTotal()"></div>
                <div class="form-group"><label>치안</label><input type="number" class="q2-input" min="0" max="5" value="0" onchange="calcTotal()"></div>
                <div class="form-group"><label>자녀교육</label><input type="number" class="q2-input" min="0" max="5" value="0" onchange="calcTotal()"></div>
            </div>
            <div class="score-total" id="q2Total">현재 Q2 총점: 0 / 20점</div>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <button class="btn style="padding: 12px 30px; font-size: 1.1em;" onclick="submitSurvey()">결과 제출하기</button>
        </div>
    </div>

    <div id="resultView" class="result-view">
        <div id="currentUserTitle" class="current-user-title"></div>
        
        <div class="chart-wrapper">
            <div class="chart-container">
                <h4 style="text-align: center;">배우자 선택 조건</h4>
                <canvas id="chartQ1"></canvas>
            </div>
            <div class="chart-container">
                <h4 style="text-align: center;">미국 이민 이상적인 도시</h4>
                <canvas id="chartQ2"></canvas>
            </div>
        </div>

        <div class="nav-buttons">
            <button class="btn btn-success" onclick="showOtherResult()">다른 사람 결과보기 🔄</button>
            <button class="btn" style="background-color: #6c757d;" onclick="backToMyResult()">내 결과 다시보기</button>
        </div>
    </div>
</div>

<div id="adminModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>관리자 시스템 (Data Management)</h2>
            <button class="btn btn-danger" onclick="closeAdminModal()">닫기</button>
        </div>
        <div id="adminAuthForm">
            <p>관리자 계정 정보를 입력하세요.</p>
            <div class="form-group"><label>아이디</label><input type="text" id="adminId"></div>
            <div class="form-group"><label>비밀번호</label><input type="password" id="adminPw"></div>
            <button class="btn" onclick="loginAdmin()">로그인</button>
        </div>
        <div id="adminDashboard" style="display: none;">
            <div style="margin-bottom: 15px;">
                <button class="btn btn-success" onclick="downloadCSV()">CSV 다운로드 📥</button>
            </div>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>닉네임</th>
                            <th>Q1 (외,학,집,성,가,재)</th>
                            <th>Q2 (날,편,비,연,치,교)</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // 로컬 스토리지에 데이터 명칭 정의
    const DB_KEY = "balance_game_db";
    const AUTH_KEY = "has_participated";

    let db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
    let myResult = null; // 현재 참여자의 데이터 저장 변수
    let currentViewerIndex = -1; // '다른 사람 결과보기' 탐색 인덱스

    // 차트 객체 전역 관리
    let chartInstanceQ1 = null;
    let chartInstanceQ2 = null;

    // 페이지 로드 시 중복 참여 여부 확인
    window.onload = function() {
        if (localStorage.getItem(AUTH_KEY)) {
            alert("이미 참여하셨습니다. 결과 화면으로 이동합니다.");
            myResult = JSON.parse(localStorage.getItem(AUTH_KEY));
            showResults(myResult);
        }
    };

    // 실시간 점수 합산 및 검증
    function calcTotal() {
        let q1Sum = 0, q2Sum = 0;
        document.querySelectorAll('.q1-input').forEach(i => q1Sum += Number(i.value));
        document.querySelectorAll('.q2-input').forEach(i => q2Sum += Number(i.value));

        document.getElementById('q1Total').innerText = `현재 Q1 총점: ${q1Sum} / 20점`;
        document.getElementById('q2Total').innerText = `현재 Q2 총점: ${q2Sum} / 20점`;

        if(q1Sum > 20) document.getElementById('q1Total').style.color = 'red';
        else document.getElementById('q1Total').style.color = '#e44d26';
        
        if(q2Sum > 20) document.getElementById('q2Total').style.color = 'red';
        else document.getElementById('q2Total').style.color = '#e44d26';

        return { q1Sum, q2Sum };
    }

    // 데이터 제출 함수
    function submitSurvey() {
        const nickname = document.getElementById('nickname').value.trim();
        if (!nickname) {
            alert("오픈채팅방 닉네임을 입력해 주세요.");
            return;
        }

        if (localStorage.getItem(AUTH_KEY)) {
            alert("이미 참여하신 기록이 있습니다.");
            return;
        }

        const totals = calcTotal();
        
        // 유효성 검사 (0~5 범위 및 총점 20점 제한)
        let invalidRange = false;
        const q1Data = Array.from(document.querySelectorAll('.q1-input')).map(i => {
            let v = Number(i.value);
            if(v < 0 || v > 5) invalidRange = true;
            return v;
        });
        const q2Data = Array.from(document.querySelectorAll('.q2-input')).map(i => {
            let v = Number(i.value);
            if(v < 0 || v > 5) invalidRange = true;
            return v;
        });

        if (invalidRange) {
            alert("각 선택지마다 입력할 수 있는 점수는 0점부터 5점까지입니다.");
            return;
        }
        if (totals.q1Sum > 20 || totals.q2Sum > 20) {
            alert("설문당 총점은 20점을 초과할 수 없습니다.");
            return;
        }

        // 데이터 객체 생성
        const payload = {
            id: Date.now(),
            nickname: nickname,
            q1: q1Data, // [외모, 학력, 집안, 성격, 가치관, 재산]
            q2: q2Data  // [날씨, 생활편리성, 저렴한생활비, 연봉, 치안, 자녀교육]
        };

        // DB(localStorage)에 저장
        db.push(payload);
        localStorage.setItem(DB_KEY, JSON.stringify(db));
        
        // 중복 제출 방지 플래그(유저 데이터 포함) 세팅
        localStorage.setItem(AUTH_KEY, JSON.stringify(payload));
        myResult = payload;

        alert("제출이 완료되었습니다!");
        showResults(payload);
    }

    // 육각형 그래프 그리기 (Chart.js Radar)
    function renderCharts(data, titlePrefix = "내 결과") {
        document.getElementById('currentUserTitle').innerText = `✨ [${titlePrefix}] 닉네임: ${data.nickname} 님의 성향 지표`;

        const ctx1 = document.getElementById('chartQ1').getContext('2m');
        const ctx2 = document.getElementById('chartQ2').getContext('2m');

        // 기존 차트 파괴 (재렌더링 오류 방지)
        if (chartInstanceQ1) chartInstanceQ1.destroy();
        if (chartInstanceQ2) chartInstanceQ2.destroy();

        const chartConfig = (labels, values, labelName, color) => ({
            type: 'radar',
            data: {
                labels: labels,
                datasets: [{
                    label: labelName,
                    data: values,
                    backgroundColor: color + '33',
                    borderColor: color,
                    borderWidth: 2,
                    pointBackgroundColor: color
                }]
            },
            options: {
                scales: {
                    r: {
                        min: 0,
                        max: 5,
                        ticks: { stepSize: 1, display: false }
                    }
                },
                plugins: { legend: { display: false } }
            }
        });

        chartInstanceQ1 = new Chart(document.getElementById('chartQ1'), chartConfig(
            ['외모', '학력', '집안', '성격', '가치관', '재산'],
            data.q1, '배우자 조건', '#007bff'
        ));

        chartInstanceQ2 = new Chart(document.getElementById('chartQ2'), chartConfig(
            ['날씨', '생활편리', '생활비', '연봉', '치안', '자녀교육'],
            data.q2, '이민 도시 조건', '#28a745'
        ));
    }

    // 결과 화면 노출 토글
    function showResults(data) {
        document.getElementById('surveyForm').style.display = 'none';
        document.getElementById('resultView').style.display = 'block';
        renderCharts(data, "내 결과");
    }

    // 다른 사람 결과보기 (랜덤 또는 순차 탐색)
    function showOtherResult() {
        if (db.length <= 1) {
            alert("참여한 다른 사람이 아직 없습니다.");
            return;
        }
        
        // 본인 데이터를 제외한 데이터 필터링
        let filtered = db.filter(item => !myResult || item.id !== myResult.id);
        
        if (filtered.length === 0) {
            alert("참여한 다른 사람이 없습니다.");
            return;
        }

        currentViewerIndex = (currentViewerIndex + 1) % filtered.length;
        const targetData = filtered[currentViewerIndex];
        renderCharts(targetData, "다른 사람 결과");
    }

    // 내 결과 다시보기
    function backToMyResult() {
        if(myResult) {
            renderCharts(myResult, "내 결과");
        } else {
            alert("입력된 내 결과가 없습니다.");
        }
    }

    /* --- 관리자 시스템 스크립트 --- */
    function openAdminModal() { document.getElementById('adminModal').style.display = 'flex'; }
    function closeAdminModal() { document.getElementById('adminModal').style.display = 'none'; }

    function loginAdmin() {
        const id = document.getElementById('adminId').value;
        const pw = document.getElementById('adminPw').value;

        if (id === "admin" && pw === "GoUSA1") {
            document.getElementById('adminAuthForm').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
            renderAdminTable();
        } else {
            alert("로그인 정보가 올바르지 않습니다.");
        }
    }

    function renderAdminTable() {
        const tbody = document.getElementById('adminTableBody');
        tbody.innerHTML = "";
        
        db = JSON.parse(localStorage.getItem(DB_KEY)) || [];

        db.forEach((item, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${item.nickname}</strong></td>
                <td>[${item.q1.join(',')}]</td>
                <td>[${item.q2.join(',')}]</td>
                <td><button class="btn btn-danger" style="padding:3px 8px; font-size:0.85em;" onclick="deleteData(${item.id})">삭제</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 데이터 선택적 삭제
    function deleteData(id) {
        if(confirm("해당 데이터를 정말 삭제하시겠습니까?")) {
            db = db.filter(item => item.id !== id);
            localStorage.setItem(DB_KEY, JSON.stringify(db));
            
            // 만약 지운 데이터가 내 데이터라면 중복방지 플래그도 같이 날림
            if(myResult && myResult.id === id) {
                localStorage.removeItem(AUTH_KEY);
                myResult = null;
                location.reload();
            }
            
            renderAdminTable();
        }
    }

    // CSV 파일 빌드 및 다운로드
    function downloadCSV() {
        if (db.length === 0) {
            alert("다운로드할 데이터가 없습니다.");
            return;
        }

        // CSV 헤더 정의 (엑셀 깨짐 방지를 위해 BOM 추가)
        let csvContent = "\uFEFF"; 
        csvContent += "닉네임,Q1_외모,Q1_학력,Q1_집안,Q1_성격,Q1_가치관,Q1_재산,Q2_날씨,Q2_생활편리성,Q2_저렴한생활비,Q2_연봉,Q2_치안,Q2_자녀교육\n";

        db.forEach(item => {
            let row = [
                `"${item.nickname.replace(/"/g, '""')}"`, // 닉네임 쉼표 예외 처리
                ...item.q1,
                ...item.q2
            ].join(",");
            csvContent += row + "\n";
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `balance_game_results_${Date.now()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
